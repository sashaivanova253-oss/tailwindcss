<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto flex items-center justify-center min-h-screen p-4">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 w-full">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden transition-transform duration-300 hover:scale-[1.01]">
        <div class="grid grid-cols-1 gap-8 p-6">
          <div>
          <img class="w-full h-auto object-cover rounded-xl" src="image.png" alt="Mark II">
        </div>
        
          <div class="flex flex-col justify-center">
          <h2 class="text-2xl font-extrabold text-gray-800 mb-3">Mark II</h2>
            <p class="text-2xl font-bold text-blue-600 mb-4">1 200 000 ₽</p>
            <button class="w-full bg-pink-500 text-white font-semibold px-6 py-3 rounded-xl shadow-md hover:bg-pink-600 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:ring-opacity-50 transition-colors duration-300 text-lg">
              Купить
            </button>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-xl overflow-hidden transition-transform duration-300 hover:scale-[1.01]">
        <div class="grid grid-cols-1 gap-8 p-6">
          <div>
            <img class="w-full h-auto object-cover rounded-xl" src="image.png" alt="Mark III">
          </div>
          
          <div class="flex flex-col justify-center">
            <h2 class="text-2xl font-extrabold text-gray-800 mb-3">Mark II</h2>
            <p class="text-2xl font-bold text-blue-600 mb-4">1 200 000 ₽</p>
            <button class="w-full bg-pink-500 text-white font-semibold px-6 py-3 rounded-xl shadow-md hover:bg-pink-600 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:ring-opacity-50 transition-colors duration-300 text-lg">
              Купить
            </button>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-xl overflow-hidden transition-transform duration-300 hover:scale-[1.01]">
        <div class="grid grid-cols-1 gap-8 p-6">
          <div>
            <img class="w-full h-auto object-cover rounded-xl" src="image.png" alt="Mark IV">
          </div>
          
          <div class="flex flex-col justify-center">
            <h2 class="text-2xl font-extrabold text-gray-800 mb-3">Mark II</h2>

            Купить
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
